name: Feature request
description: Propose a focused improvement to ticker-line.
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What use case or limitation should this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the smallest useful change and show the desired API shape if applicable.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What can users do today, and why is it insufficient?
  - type: checkboxes
    id: impact
    attributes:
      label: Impact
      options:
        - label: This changes the public API or cache key.
        - label: This changes renderer output.
        - label: This requires a new provider or dependency.

name: Bug report
description: Report a reproducible problem with the API, renderer, or documentation.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: >-
        Do not include API keys, access tokens, or private market-data responses.
        Report security issues through the process in SECURITY.md.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include a URL or minimal sequence of steps with secrets removed.
      placeholder: |
        1. Request ...
        2. Observe ...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, runtime, operating system, or client where relevant.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add response headers, screenshots, or logs after removing sensitive data.
